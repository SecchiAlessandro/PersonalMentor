name: Daily Newspaper

# Runs the pipeline in GitHub's cloud so it fires even when the laptop is
# off. Fires at both 05:00 and 06:00 UTC (covers CEST/CET); the gate step
# below only lets one of the two actually run, whichever lands on 07:00
# Europe/Zurich local time.
on:
  schedule:
    - cron: '0 5,6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Zurich
    steps:
      - name: Gate on Europe/Zurich local time
        id: gate
        run: |
          HOUR=$(TZ=Europe/Zurich date +%H)
          if [ "$HOUR" = "07" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.13'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Configure git identity
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily pipeline
        if: steps.gate.outputs.run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python skills/daily-newspaper/scripts/run_daily.py

      - name: Commit memory state updates
        if: steps.gate.outputs.run == 'true'
        run: |
          git add -u memory/
          if ! git diff --cached --quiet; then
            git commit -m "Update memory state from scheduled run"
            git pull --rebase --autostash origin main
            git push origin main
          fi
