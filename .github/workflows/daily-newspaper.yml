name: Daily Newspaper

# Runs the pipeline in GitHub's cloud so it fires even when the laptop is
# off. Fires at both 05:00 and 06:00 UTC (covers CEST/CET, one of which
# lands near 07:00 Europe/Zurich local time). GitHub does not guarantee
# scheduled runs fire on time — delays of an hour or more are common — so
# the gate below does NOT check the wall clock. Instead it checks whether
# today's edition has already been published; whichever of the two cron
# firings runs first generates it, and the other (or a later re-fire of
# the same slot) is a no-op. workflow_dispatch always runs.
on:
  schedule:
    - cron: '0 5,6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Zurich
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate on "already published today"
        id: gate
        run: |
          TODAY=$(TZ=Europe/Zurich date +%F)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -f "output/daily/${TODAY}.html" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.13'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Configure git identity
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily pipeline
        if: steps.gate.outputs.run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python skills/daily-newspaper/scripts/run_daily.py

      - name: Commit memory state updates
        if: steps.gate.outputs.run == 'true'
        run: |
          git add -u memory/
          if ! git diff --cached --quiet; then
            git commit -m "Update memory state from scheduled run"
            git pull --rebase --autostash origin main
            git push origin main
          fi
