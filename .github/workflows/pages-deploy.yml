name: Deploy Pages

# Publishes the repo root to GitHub Pages. Pages' source is set to
# "GitHub Actions" in repo settings, which (unlike the legacy "Deploy
# from a branch" source) does not auto-publish on push — it requires an
# explicit workflow using the official Pages actions, which is what
# this workflow provides.
#
# Triggers on both `push` (covers manual/local commits, pushed with the
# user's own credentials) AND `workflow_run` completion of "Daily
# Newspaper" (covers the automated daily pipeline's commits: those are
# pushed using the default GITHUB_TOKEN, and GitHub does not let
# GITHUB_TOKEN-authored pushes trigger other workflows' `push` event —
# `workflow_run` is exempt from that restriction).
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Daily Newspaper"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
