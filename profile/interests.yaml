# PersonalMentor — Interests & Topics
# Drives relevance scoring for news, jobs, and events.
#   - professional topics: weighted (1-10), the strongest signal
#   - relevance_keywords: finer terms (weighted) for topical news/event filtering
#   - job_search: roles/companies/locations for the job scorer
# Matching is whole-word + case-insensitive (so "ai" won't match "available").

